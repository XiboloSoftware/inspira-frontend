function carpetaHtml(c){

}

function fasesCheckHtml(fases){
  if(!fases||!fases.length)return"";
  const nextUndone=fases.findIndex(x=>!x.done);
  let h=`<div class="phases-check">`;
  fases.forEach((f,i)=>{
    const isDone=f.done;
    const isCurrent=i===nextUndone;
    h+=`<div class="phase-row ${isDone?'ph-done':isCurrent?'ph-current':''}">
      <span style="font-size:14px;line-height:1">${isDone?'✅':isCurrent?'🔄':'⬜'}</span>
      <div style="flex:1">
        <div class="phase-label">${f.label}</div>
        ${f.pendiente&&f.pendiente.trim()?`<div class="phase-pend">⚠️ ${f.pendiente}</div>`:(isDone?`<div class="phase-pend-ok">Completada</div>`:"")}
      </div>
    </div>`;
  });
  return h+`</div>`;
}

function collectPagos(){return{tipo:g("e_pago_tipo"),total:g("e_pago_total"),cuotas:g("e_pago_cuotas"),pagadas:g("e_pago_pagadas"),pendiente:g("e_pago_pendiente")}}
function collectPending(){const r=g("e_pending");return r?r.split("\n").map(s=>s.trim()).filter(Boolean):[]}

function applyFields(c,sv){
  c.name=g("e_name")||c.name;c.estado=g("e_estado");c.paquete=g("e_paquete");
  c.carpeta=g("e_carpeta");c.driveUrl=g("e_driveUrl");c.portalUrl=g("e_portalUrl");
  c.pagos=collectPagos();c.pending=collectPending();
  if(sv==="master"){
    c.masterElegido=g("e_masterElegido");c.interes=g("e_interes");c.uni_origen=g("e_uni_origen");c.promedio=g("e_promedio");
    c.portalLinked=g("e_portalLinked")==="1";
    c.notaMedia=gc("e_notaMedia");c.cvEuropass=gc("e_cvEuropass");c.docCompletos=gc("e_docCompletos");
    c.pasos={fichero:gc("e_fichero"),informe:gc("e_informe"),escogio:gc("e_escogio"),postulacion:gc("e_postulacion")};
    c.beca={aprobable:g("e_beca_aprobable")==="1",detalle:g("e_beca_detalle")};
    c.unis=tmpUnis;
  } else if(sv==="visa"){
    c.fases=collectFases();c.fechaCita=g("e_fechaCita");c.pasaporte=g("e_pasaporte");c.fNac=g("e_fNac");
    c.nie=g("e_nie");c.expediente=g("e_expediente");c.llegada=g("e_llegada");c.plazoMax=g("e_plazoMax");c.plazoIdeal=g("e_plazoIdeal");
  } else if(sv==="ee"){
    c.fases=collectFases();c.detalle=g("e_detalle");c.llegada=g("e_llegada");c.plazoMax=g("e_plazoMax");c.plazoIdeal=g("e_plazoIdeal");
    c.pasaporte=g("e_pasaporte");c.fNac=g("e_fNac");c.nie=g("e_nie");c.expediente=g("e_expediente");c.fPresentacion=g("e_fPresentacion");
  } else if(sv==="fp"){
    c.centro=g("e_centro");c.estadoAdm=g("e_estadoAdm");c.nie=g("e_nie");c.expediente=g("e_expediente");
  } else if(sv==="legal"){
    c.tipo=g("e_tipo");c.resultado=g("e_resultado");c.asesor=g("e_asesor");c.resolucion=g("e_resolucion");c.nie=g("e_nie");c.expediente=g("e_expediente");
  }
}

function saveEdit(name,svc){
  syncTmpUnis();
  const idx=DATA[svc].findIndex(x=>x.name===name);if(idx<0)return;
  applyFields(DATA[svc][idx],svc);editKey=null;editSvc=null;saveData();render();
}

  const name=g("e_name");if(!name.trim()){alert("El nombre es obligatorio");return}
  let c={name,pagos:mkP(),pending:[],driveUrl:"",portalUrl:""};
  if(svc==="master")Object.assign(c,{estado:"ACTIVO",paquete:"",carpeta:"",promedio:"",interes:"",uni_origen:"",masterElegido:"",notaMedia:false,cvEuropass:false,docCompletos:false,portalLinked:false,beca:mkBeca(),pasos:mkPS(),unis:[]});
  else if(svc==="visa")Object.assign(c,{estado:"ACTIVO",paquete:"Visa de estudios",carpeta:"",fases:mkFases(),fechaCita:"",nie:"",expediente:"",llegada:"",fNac:"",pasaporte:"",plazoMax:"",plazoIdeal:""});
  else if(svc==="ee")Object.assign(c,{estado:"ACTIVO",paquete:"Estancia por estudios",carpeta:"",fases:mkFases(),detalle:"",llegada:"",plazoMax:"",plazoIdeal:"",pasaporte:"",fNac:"",nie:"",expediente:"",fPresentacion:""});
  else if(svc==="fp")Object.assign(c,{estado:"ACTIVO",paquete:"FP España",carpeta:"",centro:"",estadoAdm:"",nie:"",expediente:""});
  else if(svc==="legal")Object.assign(c,{estado:"ACTIVO",paquete:"Legal Extranjería",carpeta:"",tipo:"Recurso Reposición",resultado:"",asesor:"",nie:"",expediente:"",resolucion:""});
  applyFields(c,svc);DATA[svc].push(c);addMode=null;curTab=svc;saveData();render();
}
function confirmDel(name,svc){delKey=name;delSvc=svc;render()}
function cancelDel(){delKey=null;delSvc=null;render()}
function doDelete(){
  if(!delKey||!delSvc)return;
  DATA[delSvc]=DATA[delSvc].filter(x=>x.name!==delKey);
  if(expKey===delKey+delSvc)expKey=null;
  delKey=null;delSvc=null;saveData();render();
}
function exportJSON(){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"}));
  a.download="inspira_clientes_"+new Date().toISOString().slice(0,10)+".json";a.click();
}
function getVisible(){
  const q=document.getElementById("q")?document.getElementById("q").value.toLowerCase():"";
  const fil=document.getElementById("fil")?document.getElementById("fil").value:"";
  let list=curTab==="all"?SVC_KEYS.flatMap(s=>DATA[s].map(c=>({...c,_svc:s}))):DATA[curTab].map(c=>({...c,_svc:curTab}));
  if(q)list=list.filter(c=>c.name.toLowerCase().includes(q));
  if(fil)list=list.filter(c=>c.estado===fil);
  return list;
}

function render(){
  const list=getVisible();
  const total=SVC_KEYS.reduce((a,s)=>a+DATA[s].length,0);
  const counts={all:total,...Object.fromEntries(SVC_KEYS.map(s=>[s,DATA[s].length]))};
  let h=`<div class="topbar">
    <span class="topbar-title">Panel asesoras — Inspira Legal</span>
    <div class="topbar-btns">
      <button class="tbtn exp" onclick="exportJSON()">Exportar JSON</button>
      <button class="tbtn add" onclick="openAdd()">+ Agregar cliente</button>
    </div>
  </div>`;
  h+=`<div class="tabs">${TABS_LIST.map(t=>`<button class="tab${curTab===t.id?" on":""}" onclick="setTab('${t.id}')">${t.label} <span style="font-size:10px;opacity:.6">${counts[t.id]}</span></button>`).join("")}</div>`;
  const act=list.filter(c=>c.estado==="ACTIVO").length;
  const noact=list.filter(c=>c.estado==="NO ACTIVO").length;
  const activar=list.filter(c=>c.estado==="ACTIVAR").length;
  const pend=list.filter(c=>c.pending&&c.pending.length>0).length;
  h+=`<div class="stats">
    <div class="sc"><div class="sl">Total</div><div class="sn">${list.length}</div></div>
    <div class="sc"><div class="sl">Activos</div><div class="sn">${act}</div></div>
    <div class="sc"><div class="sl">No activos</div><div class="sn">${noact}</div></div>
    <div class="sc"><div class="sl">Por activar</div><div class="sn">${activar}</div></div>
    <div class="sc"><div class="sl">Con pendientes</div><div class="sn">${pend}</div></div>
  </div>`;
  const qval=document.getElementById("q")?document.getElementById("q").value:"";
  const filval=document.getElementById("fil")?document.getElementById("fil").value:"";
  h+=`<div class="tbar"><input type="text" id="q" placeholder="Buscar cliente..." oninput="render()" value="${qval}"><select id="fil" onchange="render()"><option value="">Todos los estados</option>${CL_EST.map(s=>`<option value="${s}" ${filval===s?'selected':''}>${s}</option>`).join("")}</select></div>`;

  if(addMode){
    h+=`<div class="modal-wrap"><div class="modal">
      <div class="mhead"><h3>Nuevo cliente</h3><div class="mbtns"><button class="mcl" onclick="addMode=null;render()">Cancelar</button><button class="msv" onclick="saveNew('${addSvc}')">Guardar</button></div></div>
      <div class="msec" style="margin-top:0;padding-top:0;border-top:none">Servicio</div>
      <div class="svc-picker">${SVC_KEYS.map(s=>`<button class="svc-opt${addSvc===s?" sel":""}" onclick="addSvc='${s}';tmpUnis=[];renderAddForm()">${SVC_LABELS[s]}</button>`).join("")}</div>
      <div id="add-form-body">${buildForm({},addSvc)}</div>
    </div></div>`;
  } else if(editKey){
    const c={...DATA[editSvc].find(x=>x.name===editKey),_svc:editSvc};
    h+=`<div class="modal-wrap"><div class="modal">
      <div class="mhead"><h3>Editar: ${c.name}</h3><div class="mbtns"><button class="mcl" onclick="editKey=null;editSvc=null;render()">Cancelar</button><button class="msv" onclick="saveEdit('${c.name.replace(/'/g,"\\'")}','${editSvc}')">Guardar</button></div></div>
      ${buildForm(c,editSvc)}
    </div></div>`;
  }

  if(!addMode&&!editKey){
    if(!list.length){
      h+=`<div style="padding:2rem;text-align:center;color:#aaa;font-size:12px">Sin resultados</div>`;
    } else {
      h+=`<div class="grid">`;
      list.forEach(c=>{
        const key=c.name+c._svc,isExp=expKey===key;
        const[bg,col]=AVG[c._svc]||["#F1EFE8","#5F5E5A"];
        const hasPend=c.pending&&c.pending.length>0;
        const svcL=SVC_LABELS[c._svc]||c._svc;
        let faseLabel="";
        if((c._svc==="visa"||c._svc==="ee")&&c.fases){
          const done=c.fases.filter(f=>f.done);
          faseLabel=done.length?` · ${done[done.length-1].label}`:" · Sin iniciar";
        }
        const isDelConfirm=delKey===c.name&&delSvc===c._svc;
        const hasBeca=c.beca&&c.beca.aprobable;
        h+=`<div class="card${isExp?" exp":""}${c.portalLinked?" portal-linked":""}">
          <div class="ch" onclick="toggleExp('${key.replace(/'/g,"\\'")}')">
            <div class="av" style="background:${bg};color:${col}">${ini(c.name)}</div>
            <div class="cn">
              <div class="nm">${c.name}${c.portalLinked?` <span class="portal-tag">portal</span>`:""}${hasBeca?` <span class="bdg-beca">✨ beca</span>`:""}</div>
              <div class="sb">${svcL} · ${c.paquete||"Sin paquete"}${faseLabel}${c.promedio?` · <span style="color:#085041;font-weight:600">Prom: ${c.promedio}</span>`:""}</div>
            </div>
            <div class="cr">
              <span class="bdg ${stC(c.estado)}">${c.estado}</span>
              ${hasPend?`<span class="pc"><span class="pdot"></span>${c.pending.length}</span>`:""}
              <button class="edbtn" onclick="event.stopPropagation();openEdit('${c.name.replace(/'/g,"\\'")}','${c._svc}')">Editar</button>
              <button class="delbtn" onclick="event.stopPropagation();confirmDel('${c.name.replace(/'/g,"\\'")}','${c._svc}')">Eliminar</button>
            </div>
            <span class="chv">▼</span>
          </div>
          ${isDelConfirm?`<div class="del-confirm"><span>¿Eliminar a <b>${c.name}</b>?</span><button class="del-no" onclick="cancelDel()">Cancelar</button><button class="del-yes" onclick="doDelete()">Sí, eliminar</button></div>`:""}
          <div class="det">${detHtml(c)}</div>
        </div>`;
      });
      h+=`</div>`;
    }
  }
  document.getElementById("app").innerHTML=h;
}

function renderAddForm(){
  const fb=document.getElementById("add-form-body");
  if(fb)fb.innerHTML=buildForm({},addSvc);
  document.querySelectorAll(".svc-opt").forEach(b=>{b.classList.toggle("sel",b.textContent.trim()===SVC_LABELS[addSvc])});
}
function toggleExp(k){expKey=expKey===k?null:k;render()}
function setTab(id){curTab=id;expKey=null;render()}
function openEdit(name,svc){editKey=name;editSvc=svc;addMode=null;const c=DATA[svc].find(x=>x.name===name);tmpUnis=JSON.parse(JSON.stringify(c.unis||[]));render()}
function openAdd(){addMode=true;addSvc=curTab==="all"?"master":curTab;editKey=null;tmpUnis=[];render();const mw=document.querySelector(".modal-wrap");if(mw)mw.scrollIntoView({behavior:"smooth",block:"start"})}

render();
</script>
</body>
</html>
