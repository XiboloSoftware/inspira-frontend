<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Asesoras — Inspira Legal</title>
<style>
:root{color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:13px;background:#f5f5f3;color:#111;min-height:100vh}
.wrap{max-width:920px;margin:0 auto;padding:1rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px}
.topbar-title{font-size:16px;font-weight:600;color:#111}
.topbar-btns{display:flex;gap:5px}
.tbtn{padding:5px 12px;border-radius:7px;border:.5px solid #ccc;background:#fff;color:#111;cursor:pointer;font-size:11px}
.tbtn.add{background:#EAF3DE;color:#3B6D11;border-color:#97C459;font-weight:600}
.tbtn.exp{background:#E6F1FB;color:#185FA5;border-color:#85B7EB}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.tab{padding:4px 12px;border-radius:20px;border:.5px solid #ccc;background:transparent;cursor:pointer;font-size:12px;color:#666}
.tab.on{background:#eee;color:#111;border-color:#999;font-weight:600}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.sc{background:#fff;border-radius:8px;padding:8px 10px;border:.5px solid #e0e0e0}
.sl{font-size:10px;color:#888;margin-bottom:2px}
.sn{font-size:20px;font-weight:600}
.tbar{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.tbar input,.tbar select{padding:6px 9px;border-radius:7px;border:.5px solid #ccc;background:#fff;color:#111;font-size:12px}
.tbar input{flex:1;min-width:130px}
.grid{display:flex;flex-direction:column;gap:5px}
.card{background:#fff;border:.5px solid #e0e0e0;border-radius:10px;overflow:hidden}
.card.portal-linked{border-left:3px solid #534AB7}
.ch{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;user-select:none}
.ch:hover{background:#f9f9f7}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.cn{flex:1;min-width:0}
.nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb{font-size:11px;color:#888;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr{display:flex;align-items:center;gap:5px;flex-shrink:0}
.bdg{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.ba{background:#EAF3DE;color:#3B6D11}.bn{background:#F1EFE8;color:#5F5E5A}.bac{background:#FAEEDA;color:#854F0B}
.bdg-beca{background:#FDE8FF;color:#6B1A7E;border:.5px solid #D49FE8;font-size:9px;padding:1px 6px;border-radius:8px}
.pdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#EF9F27;margin-right:3px}
.pc{font-size:10px;color:#888}
.portal-tag{font-size:9px;padding:1px 5px;border-radius:8px;background:#EEEDFE;color:#3C3489;border:.5px solid #AFA9EC}
.chv{font-size:9px;color:#bbb;transition:transform .18s;margin-left:2px}
.card.exp .chv{transform:rotate(180deg)}
.edbtn{padding:3px 8px;border-radius:6px;border:.5px solid #ccc;background:#f5f5f3;cursor:pointer;font-size:11px;color:#333}
.delbtn{padding:3px 8px;border-radius:6px;border:.5px solid #F09595;background:#FCEBEB;cursor:pointer;font-size:11px;color:#A32D2D}
.det{display:none;border-top:.5px solid #eee;padding:10px 12px}
.card.exp .det{display:block}
.section{margin-bottom:10px}
.stitle{font-size:11px;font-weight:600;color:#888;margin-bottom:5px;padding-bottom:3px;border-bottom:.5px solid #eee}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.dl{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1px}
.dv{font-size:12px}.dv.miss{color:#A32D2D;font-style:italic}.dv.ok{color:#3B6D11;font-weight:600}
.carpeta-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.carpeta-val{font-size:12px}
.carp-btn{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;border:.5px solid;font-size:10px;cursor:pointer;text-decoration:none;font-weight:500}
.carp-drive{background:#E8F0FE;color:#1A55C7;border-color:#93B0F0}
.carp-portal{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.carp-disabled{opacity:.35;cursor:default;pointer-events:none}
.phases-check{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
.phase-row{display:flex;align-items:flex-start;gap:8px;padding:5px 8px;border-radius:7px;background:#f9f9f7;border:.5px solid #eee}
.phase-row.ph-done{background:#EAF3DE;border-color:#97C459}
.phase-row.ph-current{background:#FAEEDA;border-color:#EF9F27}
.phase-label{font-size:11px;font-weight:600;flex:1}
.phase-pend{font-size:10px;color:#A32D2D;margin-top:2px;font-style:italic}
.phase-pend-ok{font-size:10px;color:#3B6D11;margin-top:2px}
.beca-box{background:#FDE8FF;border:.5px solid #D49FE8;border-radius:7px;padding:7px 10px;margin-top:5px}
.beca-box.no{background:#f5f5f3;border-color:#ddd}
.beca-title{font-size:10px;font-weight:600;color:#6B1A7E;margin-bottom:3px}
.beca-title.no{color:#888}
.beca-det{font-size:11px;color:#444;line-height:1.4}
.steps{display:flex;gap:3px;flex-wrap:wrap}
.step{padding:2px 7px;border-radius:10px;font-size:10px;border:.5px solid}
.sd{background:#EAF3DE;color:#3B6D11;border-color:#97C459}
.sp{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.utbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.utbl th{text-align:left;padding:3px 5px;color:#888;font-weight:600;border-bottom:.5px solid #eee;font-size:10px}
.utbl td{padding:3px 5px;border-bottom:.5px solid #f0f0f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.u-adm{color:#0F6E56;font-weight:600}.u-lea{color:#854F0B}.u-pos{color:#185FA5}.u-rej{color:#A32D2D}.u-pen{color:#888}.u-nop{color:#bbb}
.portal-note{font-size:10px;color:#534AB7;background:#EEEDFE;padding:5px 9px;border-radius:6px;margin-top:6px;border:.5px solid #AFA9EC}
.plist{display:flex;flex-direction:column;gap:2px}
.pi{display:flex;align-items:flex-start;gap:5px;padding:2px 0;font-size:11px}
.pi:before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:#EF9F27;margin-top:3px;flex-shrink:0}
.paybar{display:flex;align-items:center;gap:8px;margin-top:6px}
.paytrack{flex:1;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;border:.5px solid #e0e0e0}
.payfill{height:100%;border-radius:3px;background:#3B6D11}
.modal-wrap{background:rgba(0,0,0,.45);padding:16px;border-radius:10px;margin-top:6px}
.modal{background:#fff;border-radius:12px;border:.5px solid #ddd;padding:16px;max-width:700px;margin:0 auto}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mhead h3{font-size:14px;font-weight:600}
.mbtns{display:flex;gap:5px}
.mcl{padding:5px 12px;border-radius:6px;border:.5px solid #ccc;background:transparent;cursor:pointer;font-size:12px;color:#666}
.msv{padding:5px 14px;border-radius:6px;border:.5px solid #3B6D11;background:#EAF3DE;color:#3B6D11;cursor:pointer;font-size:12px;font-weight:600}
.fg{margin-bottom:8px}
.fg label{display:block;font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.fg input,.fg select,.fg textarea{width:100%;padding:6px 8px;border-radius:6px;border:.5px solid #ccc;background:#fff;color:#111;font-size:12px;font-family:inherit}
.fg textarea{min-height:52px;resize:vertical}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.chkrow{display:flex;gap:10px;flex-wrap:wrap;padding:4px 0}
.chkrow label{display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer}
.chkrow input[type=checkbox]{width:13px;height:13px}
.etbl{width:100%;border-collapse:collapse}
.etbl th{font-size:10px;color:#888;padding:2px 3px;text-align:left;font-weight:600}
.etbl td{padding:2px 3px}
.etbl input,.etbl select{width:100%;padding:3px 5px;border-radius:4px;border:.5px solid #ccc;background:#fff;color:#111;font-size:11px;font-family:inherit}
.addbtn{padding:3px 9px;border-radius:5px;border:.5px solid #ccc;background:transparent;color:#666;cursor:pointer;font-size:11px;margin-top:3px}
.rembtn{padding:1px 5px;border-radius:4px;border:none;background:#FCEBEB;color:#A32D2D;cursor:pointer;font-size:10px}
.msec{font-size:11px;font-weight:600;color:#888;margin:10px 0 4px;padding-top:8px;border-top:.5px solid #eee}
.svc-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.svc-opt{padding:6px 14px;border-radius:8px;border:.5px solid #ccc;background:#fff;cursor:pointer;font-size:12px;color:#666}
.svc-opt.sel{border-color:#3B6D11;background:#EAF3DE;color:#3B6D11;font-weight:600}
.del-confirm{background:#FCEBEB;border:.5px solid #F09595;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-top:6px}
.del-confirm span{flex:1;font-size:12px;color:#A32D2D}
.del-yes{padding:4px 12px;border-radius:6px;border:none;background:#A32D2D;color:#fff;cursor:pointer;font-size:11px;font-weight:600}
.del-no{padding:4px 12px;border-radius:6px;border:.5px solid #ccc;background:#fff;cursor:pointer;font-size:11px}
.fase-edit-box{background:#f9f9f7;border:.5px solid #ddd;border-radius:8px;padding:8px 10px;margin-bottom:6px}
.fase-edit-row{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:.5px solid #eee}
.fase-edit-row:last-child{border-bottom:none}
.fase-edit-label{font-size:11px;font-weight:600;flex-shrink:0;padding-top:3px;min-width:190px}
.fase-edit-pend{flex:1;padding:3px 6px;border-radius:5px;border:.5px solid #ccc;font-size:11px;font-family:inherit;background:#fff;color:#111}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const FASES_VE=["Estrategia realizada","Preparación documentaria","Cita programada","Documentos listos"];
const UNI_EST=["ADMITIDO","LISTA DE ESPERA ALTA","LISTA DE ESPERA MEDIA","LISTA DE ESPERA BAJA","POSTULADO","POSTULAR","NO POSTULAR AUN","PROCESO PREVIO","PENDIENTE","EXCLUIDO","FINALIZADO"];
const CL_EST=["ACTIVO","NO ACTIVO","ACTIVAR"];
const SVC_LABELS={master:"Máster",visa:"Visa estudios",ee:"Estancia est.",fp:"FP / Grado",legal:"Legal / RR"};
const SVC_KEYS=["master","visa","ee","fp","legal"];
const AVG={master:["#EEEDFE","#3C3489"],visa:["#E6F1FB","#0C447C"],ee:["#E1F5EE","#085041"],fp:["#FAEEDA","#633806"],legal:["#FBEAF0","#72243E"]};
const TABS_LIST=[{id:"all",label:"Todos"},{id:"master",label:"Máster"},{id:"visa",label:"Visa estudios"},{id:"ee",label:"Estancia est."},{id:"fp",label:"FP / Grado"},{id:"legal",label:"Legal / RR"}];

function mkFases(){return FASES_VE.map(f=>({label:f,done:false,pendiente:""}))}
function mkP(){return{tipo:"",total:"",pagadas:"",pendiente:"",cuotas:""}}
function mkPS(){return{fichero:false,informe:false,escogio:false,postulacion:false}}
function mkBeca(){return{aprobable:false,detalle:""}}

// ── API helpers ────────────────────────────────────────────────────────────
function getToken(){return localStorage.getItem("bo_token")||""}
const API_BASE="https://api.inspira-legal.cloud";
async function api(method,path,body){
  const opts={method,headers:{"Content-Type":"application/json","Authorization":"Bearer "+getToken()}};
  if(body&&method!=="GET")opts.body=JSON.stringify(body);
  const r=await fetch(API_BASE+path,opts);
  return r.json();
}

let DATA={master:[],visa:[],ee:[],fp:[],legal:[]};
let curTab="all",expKey=null,editKey=null,editSvc=null,editId=null,addMode=null,addSvc="master",delKey=null,delSvc=null,delId=null,tmpUnis=[],deletedUniIds=[];

function ini(n){return n.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase()}
function stC(s){return s==="ACTIVO"?"ba":s==="NO ACTIVO"?"bn":"bac"}
function uCl(e){if(e==="ADMITIDO")return"u-adm";if(e&&e.includes("ESPERA"))return"u-lea";if(e==="POSTULADO"||e==="POSTULAR")return"u-pos";if(e==="EXCLUIDO"||e==="RECHAZADO")return"u-rej";if(e==="NO POSTULAR AUN")return"u-nop";return"u-pen"}
function fv(v){return(v&&v.trim())?v:"—"}
function miss(v){return!v||!v.trim()}
function payPct(p){if(!p)return 0;const t=parseFloat(p.total)||0,paid=parseFloat(p.pagadas)||0;if(!t)return 0;return Math.min(100,Math.round(paid/t*100))}

function carpetaHtml(c){
  const hasCarpeta=c.carpeta&&c.carpeta.trim();
  const hasDrive=c.driveUrl&&c.driveUrl.trim();
  const hasPortal=c.portalUrl&&c.portalUrl.trim();
  return`<div class="carpeta-row">
    <span class="carpeta-val">${hasCarpeta?c.carpeta:"—"}</span>
    ${hasDrive?`<a class="carp-btn carp-drive" href="${c.driveUrl}" target="_blank">📁 Drive</a>`:`<span class="carp-btn carp-drive carp-disabled">📁 Drive</span>`}
    ${hasPortal?`<a class="carp-btn carp-portal" href="${c.portalUrl}" target="_blank">🔗 Portal</a>`:`<span class="carp-btn carp-portal carp-disabled">🔗 Portal</span>`}
  </div>`;
}

function fasesCheckHtml(fases){
  if(!fases||!fases.length)return"";
  const nextUndone=fases.findIndex(x=>!x.done);
  let h=`<div class="phases-check">`;
  fases.forEach((f,i)=>{
    const isDone=f.done;
    const isCurrent=i===nextUndone;
    h+=`<div class="phase-row ${isDone?'ph-done':isCurrent?'ph-current':''}">
      <span style="font-size:14px;line-height:1">${isDone?'✅':isCurrent?'🔄':'⬜'}</span>
      <div style="flex:1">
        <div class="phase-label">${f.label}</div>
        ${f.pendiente&&f.pendiente.trim()?`<div class="phase-pend">⚠️ ${f.pendiente}</div>`:(isDone?`<div class="phase-pend-ok">Completada</div>`:"")}
      </div>
    </div>`;
  });
  return h+`</div>`;
}

function becaHtml(beca){
  if(!beca)return"";
  return`<div class="beca-box ${beca.aprobable?'':'no'}">
    <div class="beca-title ${beca.aprobable?'':'no'}">${beca.aprobable?'✨ Beca aprobable — análisis previo realizado':'Beca: sin análisis aprobable registrado'}</div>
    ${beca.detalle?`<div class="beca-det">${beca.detalle}</div>`:''}
  </div>`;
}

function pagoHtml(p){
  p=p||mkP();const pct=payPct(p);
  return`<div class="section"><div class="stitle">Pagos</div>
  <div class="dg3">
    <div><div class="dl">Tipo</div><div class="dv ${miss(p.tipo)?'miss':''}">${fv(p.tipo)}</div></div>
    <div><div class="dl">Total (€)</div><div class="dv ${miss(p.total)?'miss':''}">${fv(p.total)}</div></div>
    <div><div class="dl">Cuotas</div><div class="dv">${fv(p.cuotas)}</div></div>
  </div>
  <div class="paybar">
    <span style="font-size:10px;color:#888;min-width:64px">Pagado: ${fv(p.pagadas)}</span>
    <div class="paytrack"><div class="payfill" style="width:${pct}%"></div></div>
    <span style="font-size:10px;color:${miss(p.pendiente)?'#A32D2D':'#3B6D11'};min-width:72px">Pendiente: ${fv(p.pendiente)}</span>
  </div></div>`;
}

function detHtml(c){
  const sv=c._svc;let h="";
  if(sv==="master"){
    const p=c.pasos||{};
    h+=`<div class="section"><div class="stitle">Datos generales</div><div class="dg">
      <div><div class="dl">Paquete</div><div class="dv">${fv(c.paquete)}</div></div>
      <div><div class="dl">Carpeta</div>${carpetaHtml(c)}</div>
      ${c.promedio?`<div><div class="dl">Promedio ponderado</div><div class="dv ok">${c.promedio}</div></div>`:''}
      ${c.uni_origen?`<div><div class="dl">Uni origen</div><div class="dv">${c.uni_origen}</div></div>`:''}
      ${c.interes?`<div><div class="dl">Área de interés</div><div class="dv">${c.interes}</div></div>`:''}
      ${c.masterElegido?`<div style="grid-column:span 2"><div class="dl">Máster elegido</div><div class="dv ok">${c.masterElegido}</div></div>`:''}
    </div></div>`;
    h+=pagoHtml(c.pagos);
    h+=becaHtml(c.beca);
    h+=`<div class="section"><div class="stitle">Proceso</div><div class="steps">
      <span class="step ${p.fichero?'sd':'sp'}">Fichero</span>
      <span class="step ${c.notaMedia?'sd':'sp'}">Nota media</span>
      <span class="step ${c.cvEuropass?'sd':'sp'}">CV Europass</span>
      <span class="step ${p.informe?'sd':'sp'}">Informe búsqueda</span>
      <span class="step ${p.escogio?'sd':'sp'}">Escogió máster</span>
      <span class="step ${c.docCompletos?'sd':'sp'}">Docs completos</span>
      <span class="step ${p.postulacion?'sd':'sp'}">Postulación completa</span>
    </div></div>`;
    if(c.portalLinked)h+=`<div class="portal-note">Vinculado al portal del cliente — universidades y máster se sincronizarán automáticamente cuando el cliente seleccione desde su portal post-informe.</div>`;
    if(c.unis&&c.unis.length){
      h+=`<div class="section"><div class="stitle">Postulaciones por universidad</div><div style="overflow-x:auto"><table class="utbl"><thead><tr><th style="width:16%">Universidad</th><th style="width:30%">Máster específico</th><th style="width:17%">F. postulación</th><th style="width:17%">F. resultados</th><th style="width:20%">Estado</th></tr></thead><tbody>`;
      c.unis.forEach(u=>{h+=`<tr><td><b>${u.u}</b></td><td style="color:#888">${u.master||"—"}</td><td style="font-size:10px">${u.fPost||"—"}</td><td style="font-size:10px">${u.fResult||"—"}</td><td class="${uCl(u.est)}">${u.est}</td></tr>`});
      h+=`</tbody></table></div></div>`;
    }
  } else if(sv==="visa"||sv==="ee"){
    h+=`<div class="section"><div class="stitle">Fases del proceso</div>${fasesCheckHtml(c.fases||mkFases())}</div>`;
    if(sv==="visa"){
      h+=`<div class="section"><div class="stitle">Datos de visa</div><div class="dg">
        <div><div class="dl">Fecha cita consulado</div><div class="dv ${miss(c.fechaCita)?'miss':''}">${fv(c.fechaCita)}</div></div>
        <div><div class="dl">Carpeta</div>${carpetaHtml(c)}</div>
        <div><div class="dl">Pasaporte</div><div class="dv ${miss(c.pasaporte)?'miss':''}">${fv(c.pasaporte)}</div></div>
        <div><div class="dl">Fecha nacimiento</div><div class="dv ${miss(c.fNac)?'miss':''}">${fv(c.fNac)}</div></div>
        <div><div class="dl">NIE</div><div class="dv ${miss(c.nie)?'miss':''}">${fv(c.nie)}</div></div>
        <div><div class="dl">Nº expediente</div><div class="dv ${miss(c.expediente)?'miss':''}">${fv(c.expediente)}</div></div>
        <div><div class="dl">Llegada a España</div><div class="dv ${miss(c.llegada)?'miss':''}">${fv(c.llegada)}</div></div>
        <div><div class="dl">Plazo máximo</div><div class="dv ${miss(c.plazoMax)?'miss':''}">${fv(c.plazoMax)}</div></div>
        <div><div class="dl">Plazo ideal</div><div class="dv ${miss(c.plazoIdeal)?'miss':''}">${fv(c.plazoIdeal)}</div></div>
      </div></div>`;
    } else {
      h+=`<div class="section"><div class="stitle">Datos de estancia</div><div class="dg">
        <div style="grid-column:span 2"><div class="dl">Detalle</div><div class="dv">${fv(c.detalle)}</div></div>
        <div><div class="dl">Llegada a España</div><div class="dv ${miss(c.llegada)?'miss':''}">${fv(c.llegada)}</div></div>
        <div><div class="dl">Plazo máximo</div><div class="dv ${miss(c.plazoMax)?'miss':''}">${fv(c.plazoMax)}</div></div>
        <div><div class="dl">Plazo ideal</div><div class="dv ${miss(c.plazoIdeal)?'miss':''}">${fv(c.plazoIdeal)}</div></div>
        <div><div class="dl">Pasaporte</div><div class="dv ${miss(c.pasaporte)?'miss':''}">${fv(c.pasaporte)}</div></div>
        <div><div class="dl">Fecha nacimiento</div><div class="dv ${miss(c.fNac)?'miss':''}">${fv(c.fNac)}</div></div>
        <div><div class="dl">NIE</div><div class="dv ${miss(c.nie)?'miss':''}">${fv(c.nie)}</div></div>
        <div><div class="dl">Nº expediente</div><div class="dv ${miss(c.expediente)?'miss':''}">${fv(c.expediente)}</div></div>

function collectPagos(){return{tipo:g("e_pago_tipo"),total:g("e_pago_total"),cuotas:g("e_pago_cuotas"),pagadas:g("e_pago_pagadas"),pendiente:g("e_pago_pendiente")}}
function collectPending(){const r=g("e_pending");return r?r.split("\n").map(s=>s.trim()).filter(Boolean):[]}

function collectPanelBody(sv){
  const body={estado:g("e_estado"),paquete:g("e_paquete"),driveUrl:g("e_driveUrl"),portalUrl:g("e_portalUrl"),carpeta:g("e_carpeta"),pending:collectPending()};
  if(sv==="master"){
    body.masterElegido=g("e_masterElegido");body.interes=g("e_interes");
    body.uni_origen=g("e_uni_origen");body.promedio=g("e_promedio");
    body.portalLinked=g("e_portalLinked")==="1";
    body.notaMedia=gc("e_notaMedia");body.cvEuropass=gc("e_cvEuropass");body.docCompletos=gc("e_docCompletos");
    body.pasos={fichero:gc("e_fichero"),informe:gc("e_informe"),escogio:gc("e_escogio"),postulacion:gc("e_postulacion")};
    body.beca={aprobable:g("e_beca_aprobable")==="1",detalle:g("e_beca_detalle")};
  }else if(sv==="visa"){
    body.fases=collectFases();body.fechaCita=g("e_fechaCita");body.pasaporte=g("e_pasaporte");body.fNac=g("e_fNac");
    body.nie=g("e_nie");body.expediente=g("e_expediente");body.llegada=g("e_llegada");body.plazoMax=g("e_plazoMax");body.plazoIdeal=g("e_plazoIdeal");
  }else if(sv==="ee"){
    body.fases=collectFases();body.detalle=g("e_detalle");body.llegada=g("e_llegada");body.plazoMax=g("e_plazoMax");body.plazoIdeal=g("e_plazoIdeal");
    body.pasaporte=g("e_pasaporte");body.fNac=g("e_fNac");body.nie=g("e_nie");body.expediente=g("e_expediente");body.fPresentacion=g("e_fPresentacion");

    body.centro=g("e_centro");body.estadoAdm=g("e_estadoAdm");body.nie=g("e_nie");body.expediente=g("e_expediente");

  return body;

async function saveEdit(id,svc){
  syncTmpUnis();
  for(const aid of deletedUniIds)await api("DELETE","/backoffice/panel-asesoras/portales/"+aid);
  for(const u of tmpUnis){
    if(u._idAcceso)await api("PATCH","/backoffice/panel-asesoras/portales/"+u._idAcceso,{u:u.u,master:u.master,fPost:u.fPost,fResult:u.fResult,est:u.est});
    else await api("POST","/backoffice/panel-asesoras/"+id+"/portales",{u:u.u,master:u.master,fPost:u.fPost,fResult:u.fResult,est:u.est});
  }
  const res=await api("PATCH","/backoffice/panel-asesoras/"+id,collectPanelBody(svc));
  if(!res.ok){alert("Error al guardar: "+(res.msg||""));return}
  const idx=DATA[svc].findIndex(x=>x._id===id);
  if(idx>=0)DATA[svc][idx]=res.cliente;
  editId=null;editSvc=null;deletedUniIds=[];render();
}
async function saveNew(svc){
  syncTmpUnis();
  const name=g("e_name");if(!name.trim()){alert("El nombre es obligatorio");return}
  const res=await api("POST","/backoffice/panel-asesoras",{...collectPanelBody(svc),name:name.trim(),email:g("e_email")||"",panel_servicio:svc});
  if(!res.ok){alert("Error al crear: "+(res.msg||""));return}
  const newId=res.cliente._id;
  for(const u of tmpUnis)await api("POST","/backoffice/panel-asesoras/"+newId+"/portales",{u:u.u,master:u.master,fPost:u.fPost,fResult:u.fResult,est:u.est});
  DATA[svc].push(res.cliente);addMode=null;curTab=svc;render();
}
function confirmDel(id,svc){delId=id;delSvc=svc;render()}
function cancelDel(){delId=null;delSvc=null;render()}
async function doDelete(){
  if(!delId||!delSvc)return;
  const res=await api("DELETE","/backoffice/panel-asesoras/"+delId);
  if(!res.ok){alert("Error al eliminar: "+(res.msg||""));return}
  DATA[delSvc]=DATA[delSvc].filter(x=>x._id!==delId);
  delId=null;delSvc=null;render();
}
function exportJSON(){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"}));
  a.download="inspira_clientes_"+new Date().toISOString().slice(0,10)+".json";a.click();
}
function getVisible(){
  const q=document.getElementById("q")?document.getElementById("q").value.toLowerCase():"";
  const fil=document.getElementById("fil")?document.getElementById("fil").value:"";
  let list=curTab==="all"?SVC_KEYS.flatMap(s=>DATA[s].map(c=>({...c,_svc:s}))):DATA[curTab].map(c=>({...c,_svc:curTab}));
  if(q)list=list.filter(c=>c.name.toLowerCase().includes(q));
  if(fil)list=list.filter(c=>c.estado===fil);
  return list;
}

  const list=getVisible();
  const total=SVC_KEYS.reduce((a,s)=>a+DATA[s].length,0);
  const counts={all:total,...Object.fromEntries(SVC_KEYS.map(s=>[s,DATA[s].length]))};
  let h=`<div class="topbar">
    <span class="topbar-title">Panel asesoras — Inspira Legal</span>

      <button class="tbtn exp" onclick="exportJSON()">Exportar JSON</button>
      <button class="tbtn add" onclick="openAdd()">+ Agregar cliente</button>
    </div>
  </div>`;
  h+=`<div class="tabs">${TABS_LIST.map(t=>`<button class="tab${curTab===t.id?" on":""}" onclick="setTab('${t.id}')">${t.label} <span style="font-size:10px;opacity:.6">${counts[t.id]}</span></button>`).join("")}</div>`;
  const act=list.filter(c=>c.estado==="ACTIVO").length;
  const noact=list.filter(c=>c.estado==="NO ACTIVO").length;
  const activar=list.filter(c=>c.estado==="ACTIVAR").length;
  const pend=list.filter(c=>c.pending&&c.pending.length>0).length;
  h+=`<div class="stats">
    <div class="sc"><div class="sl">Total</div><div class="sn">${list.length}</div></div>
    <div class="sc"><div class="sl">Activos</div><div class="sn">${act}</div></div>
    <div class="sc"><div class="sl">No activos</div><div class="sn">${noact}</div></div>
    <div class="sc"><div class="sl">Por activar</div><div class="sn">${activar}</div></div>
    <div class="sc"><div class="sl">Con pendientes</div><div class="sn">${pend}</div></div>
  </div>`;
  const qval=document.getElementById("q")?document.getElementById("q").value:"";
  const filval=document.getElementById("fil")?document.getElementById("fil").value:"";
  h+=`<div class="tbar"><input type="text" id="q" placeholder="Buscar cliente..." oninput="render()" value="${qval}"><select id="fil" onchange="render()"><option value="">Todos los estados</option>${CL_EST.map(s=>`<option value="${s}" ${filval===s?'selected':''}>${s}</option>`).join("")}</select></div>`;

  if(addMode){
    h+=`<div class="modal-wrap"><div class="modal">
      <div class="mhead"><h3>Nuevo cliente</h3><div class="mbtns"><button class="mcl" onclick="addMode=null;render()">Cancelar</button><button class="msv" onclick="saveNew('${addSvc}')">Guardar</button></div></div>
      <div class="msec" style="margin-top:0;padding-top:0;border-top:none">Servicio</div>
      <div class="svc-picker">${SVC_KEYS.map(s=>`<button class="svc-opt${addSvc===s?" sel":""}" onclick="addSvc='${s}';tmpUnis=[];renderAddForm()">${SVC_LABELS[s]}</button>`).join("")}</div>
      <div id="add-form-body">${buildForm({},addSvc,true)}</div>
    </div></div>`;
  } else if(editId){
    const c={...DATA[editSvc].find(x=>x._id===editId),_svc:editSvc};
    h+=`<div class="modal-wrap"><div class="modal">
      <div class="mhead"><h3>Editar: ${c.name}</h3><div class="mbtns"><button class="mcl" onclick="editId=null;editSvc=null;render()">Cancelar</button><button class="msv" onclick="saveEdit(${editId},'${editSvc}')">Guardar</button></div></div>
      ${buildForm(c,editSvc)}
    </div></div>`;
  }

  if(!addMode&&!editId){
    if(!list.length){
      h+=`<div style="padding:2rem;text-align:center;color:#aaa;font-size:12px">Sin resultados</div>`;
    } else {
      h+=`<div class="grid">`;
      list.forEach(c=>{
        const key=c.name+c._svc,isExp=expKey===key;
        const[bg,col]=AVG[c._svc]||["#F1EFE8","#5F5E5A"];
        const hasPend=c.pending&&c.pending.length>0;
        const svcL=SVC_LABELS[c._svc]||c._svc;
        let faseLabel="";
        if((c._svc==="visa"||c._svc==="ee")&&c.fases){
          const done=c.fases.filter(f=>f.done);
          faseLabel=done.length?` · ${done[done.length-1].label}`:" · Sin iniciar";
        }
        const isDelConfirm=delId===c._id&&delSvc===c._svc;
        const hasBeca=c.beca&&c.beca.aprobable;
        h+=`<div class="card${isExp?" exp":""}${c.portalLinked?" portal-linked":""}">
          <div class="ch" onclick="toggleExp('${key.replace(/'/g,"\\'")}')">
            <div class="av" style="background:${bg};color:${col}">${ini(c.name)}</div>
            <div class="cn">
              <div class="nm">${c.name}${c.portalLinked?` <span class="portal-tag">portal</span>`:""}${hasBeca?` <span class="bdg-beca">✨ beca</span>`:""}</div>
              <div class="sb">${svcL} · ${c.paquete||"Sin paquete"}${faseLabel}${c.promedio?` · <span style="color:#085041;font-weight:600">Prom: ${c.promedio}</span>`:""}</div>
            </div>
            <div class="cr">
              <span class="bdg ${stC(c.estado)}">${c.estado}</span>
              ${hasPend?`<span class="pc"><span class="pdot"></span>${c.pending.length}</span>`:""}
              <button class="edbtn" onclick="event.stopPropagation();openEdit(${c._id},'${c._svc}')">Editar</button>
              <button class="delbtn" onclick="event.stopPropagation();confirmDel(${c._id},'${c._svc}')">Eliminar</button>
            </div>
            <span class="chv">▼</span>
          </div>
          ${isDelConfirm?`<div class="del-confirm"><span>¿Eliminar a <b>${c.name}</b>?</span><button class="del-no" onclick="cancelDel()">Cancelar</button><button class="del-yes" onclick="doDelete()">Sí, eliminar</button></div>`:""}
          <div class="det">${detHtml(c)}</div>
        </div>`;
      });
      h+=`</div>`;
    }
  }
  document.getElementById("app").innerHTML=h;
}

function renderAddForm(){
  const fb=document.getElementById("add-form-body");
  if(fb)fb.innerHTML=buildForm({},addSvc,true);
  document.querySelectorAll(".svc-opt").forEach(b=>{b.classList.toggle("sel",b.textContent.trim()===SVC_LABELS[addSvc])});
}
function toggleExp(k){expKey=expKey===k?null:k;render()}
function setTab(id){curTab=id;expKey=null;render()}
function openEdit(id,svc){editId=id;editSvc=svc;addMode=null;const c=DATA[svc].find(x=>x._id===id);tmpUnis=JSON.parse(JSON.stringify(c&&c.unis||[]));deletedUniIds=[];render()}
function openAdd(){addMode=true;addSvc=curTab==="all"?"master":curTab;editId=null;tmpUnis=[];render();const mw=document.querySelector(".modal-wrap");if(mw)mw.scrollIntoView({behavior:"smooth",block:"start"})}

async function initPanel(){
  try{const res=await api("GET","/backoffice/panel-asesoras");if(res.ok&&res.data)DATA=res.data;}
  catch(e){console.error("Error cargando panel:",e)}
  render();
}
initPanel();
</script>
</body>
</html>
